# yaml-language-server: $schema=https://unpkg.com/@powersync/service-sync-rules@latest/schema/sync_rules.json
#
# See Documentation for more information:
# https://docs.powersync.com/usage/sync-rules

# See https://docs.powersync.com/usage/sync-rules/compatibility for config:edition details
config:
  edition: 2

# Define sync rules to control which data is synced to each user
# Docs: https://docs.powersync.com/usage/sync-rules
bucket_definitions:
  global:
    #     Sync rules without parameter queries will sync to all users
    data:
      #       Sync all rows
      - SELECT * FROM todos
